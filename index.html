<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Reporter Scheduler</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f6f8;
    }
    h1 { text-align: center; }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #005bac;
      color: white;
      cursor: pointer;
      border: none;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      background: #eef5ff;
      border-radius: 8px;
    }
    .today {
      background: #d1ffd6;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Store Reporter Scheduler</h1>

    <button onclick="requestNotificationPermission()">Enable Notifications</button>

    <label>Start Date:</label>
    <input id="startDate" type="date">

    <label>Number of Days:</label>
    <input id="days" type="number" value="7">

    <button onclick="generateSchedule()">Generate Schedule</button>

    <div class="result" id="output"></div>
  </div>

  <script>
    const stores = [
      { name: "Anabu", restDay: 1 },
      { name: "Crossing East", restDay: 1 },
      { name: "Tanza", restDay: 1 },
      { name: "Brookside", restDay: 1 },
      { name: "Binan Bayan", restDay: 1 },
      { name: "Molino", restDay: 1 },
      { name: "Manggahan", restDay: 1 },
      { name: "Pacita", restDay: 1 },

      { name: "Paradahan", restDay: 2 },
      { name: "San Pedro", restDay: 2 },
      { name: "Bacoor", restDay: 2 },
      { name: "Tagaytay", restDay: 2 },
      { name: "Dasmarinas", restDay: 2 },
      { name: "GMA", restDay: 2 },
      { name: "Kawit", restDay: 2 },

      { name: "Gentri Jr.", restDay: 4 }
    ];

    function getAvailableStores(date) {
      const day = date.getDay();
      return stores.filter(store => store.restDay !== day);
    }

    function getTodayStore() {
      const today = new Date();
      const availableStores = getAvailableStores(today);
      if (availableStores.length === 0) return "No available store";

      const index = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
      return availableStores[index % availableStores.length].name;
    }

    function generateSchedule() {
      const startDateInput = document.getElementById('startDate').value;
      const days = parseInt(document.getElementById('days').value);

      if (!startDateInput) {
        alert('Please select a start date');
        return;
      }

      const startDate = new Date(startDateInput);
      const today = new Date();

      let output = '';
      let index = 0;

      for (let i = 0; i < days; i++) {
        let currentDate = new Date(startDate);
        currentDate.setDate(startDate.getDate() + i);

        const availableStores = getAvailableStores(currentDate);

        if (availableStores.length === 0) {
          output += `<p><strong>${currentDate.toDateString()}</strong>: No available store</p>`;
          continue;
        }

        const store = availableStores[index % availableStores.length];
        index++;

        const isToday = currentDate.toDateString() === today.toDateString();

        output += `<p class="${isToday ? 'today' : ''}">
          <strong>${currentDate.toDateString()}</strong>: ${store.name}
        </p>`;
      }

      document.getElementById('output').innerHTML = output;
    }

    // 🔔 REAL NOTIFICATIONS
    function requestNotificationPermission() {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          alert('Notifications enabled!');
        }
      });
    }

    function sendNotification() {
      if (Notification.permission === 'granted') {
        const store = getTodayStore();

        new Notification('📢 Daily Report Reminder', {
          body: `Today's reporting store: ${store}`,
          icon: 'https://cdn-icons-png.flaticon.com/512/1827/1827392.png'
        });
      }
    }

    function checkAlarm() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();

      if ((hours === 10 || hours === 17) && minutes === 0) {
        sendNotification();
      }
    }

    setInterval(checkAlarm, 30000);

    // 📱 Service Worker Registration (for PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
